<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Affiliate Video Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem('av-theme');
      var dark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body class="auth-page">
  <div class="auth-theme-wrap">
    <button type="button" class="theme-toggle" id="btn-theme-toggle" aria-label="Ganti tema">
      <i data-lucide="sun" class="icon-light"></i>
      <i data-lucide="moon" class="icon-dark"></i>
      <span id="theme-toggle-label">Light mode</span>
    </button>
  </div>
  <div class="auth-card">
    <div class="auth-logo">AV</div>
    <h1>Affiliate Video Tool</h1>
    <p class="auth-subtitle">Masuk untuk melanjutkan</p>
    <form id="login-form">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required autofocus />
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required />
      <button type="submit" id="btn-login">Masuk</button>
      <div class="auth-error" id="error"></div>
    </form>
    <p class="auth-hint">Ganti password default di file <code>.env</code></p>
  </div>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script>
    const THEME_KEY = 'av-theme';

    function getTheme() {
      return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);
      const label = document.getElementById('theme-toggle-label');
      if (label) label.textContent = theme === 'dark' ? 'Dark mode' : 'Light mode';
    }

    document.getElementById('btn-theme-toggle').onclick = () => {
      setTheme(getTheme() === 'dark' ? 'light' : 'dark');
    };
    setTheme(getTheme());
    if (window.lucide) lucide.createIcons();

    const form = document.getElementById('login-form');
    const error = document.getElementById('error');
    const btn = document.getElementById('btn-login');

    fetch('/api/auth/me', { credentials: 'same-origin' }).then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/index.html';
    }).catch(() => {});

    form.onsubmit = async (e) => {
      e.preventDefault();
      error.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      const fd = new FormData(form);
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: fd.get('username'),
            password: fd.get('password'),
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'Login gagal');
        window.location.href = '/index.html';
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Masuk';
      }
    };
  </script>
</body>
</html>
