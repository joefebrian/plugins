<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — Affiliate Video Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem('av-theme');
      var dark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body class="auth-page">
  <div class="auth-bg" aria-hidden="true"></div>

  <header class="auth-topbar">
    <div class="auth-brand-mini">
      <div class="auth-logo">AV</div>
      <span>Affiliate Video</span>
    </div>
    <button type="button" class="theme-toggle auth-theme-btn" id="btn-theme-toggle" aria-label="Ganti tema">
      <i data-lucide="sun" class="icon-light"></i>
      <i data-lucide="moon" class="icon-dark"></i>
      <span id="theme-toggle-label">Light mode</span>
    </button>
  </header>

  <main class="auth-layout auth-layout-single">
    <section class="auth-form-panel">
      <div class="auth-card">
        <div class="auth-card-header">
          <h1>Buat akun</h1>
          <p class="auth-subtitle">Daftar lalu tunggu persetujuan admin untuk login</p>
        </div>

        <form id="signup-form" novalidate>
          <div class="auth-field">
            <label for="username">Username</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i data-lucide="user"></i></span>
              <input type="text" id="username" name="username" placeholder="nama.pengguna" autocomplete="username" required autofocus />
            </div>
          </div>

          <div class="auth-field">
            <label for="display_name">Nama tampilan</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i data-lucide="badge-check"></i></span>
              <input type="text" id="display_name" name="display_name" placeholder="Nama kamu" autocomplete="name" />
            </div>
          </div>

          <div class="auth-field">
            <label for="email">Email (opsional)</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i data-lucide="mail"></i></span>
              <input type="email" id="email" name="email" placeholder="email@contoh.com" autocomplete="email" />
            </div>
          </div>

          <div class="auth-field">
            <label for="password">Password</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon"><i data-lucide="lock"></i></span>
              <input type="password" id="password" name="password" placeholder="Min. 8 karakter" autocomplete="new-password" required />
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block auth-submit" id="btn-signup">
            <span class="auth-submit-text">Daftar</span>
            <i data-lucide="user-plus" class="auth-submit-icon"></i>
          </button>

          <div class="auth-error" id="error" role="alert"></div>
          <div class="auth-success hidden" id="success" role="status"></div>
        </form>

        <p class="auth-alt-link">Sudah punya akun? <a href="/login.html">Masuk</a></p>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script>
    const THEME_KEY = 'av-theme';

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);
      const label = document.getElementById('theme-toggle-label');
      if (label) label.textContent = theme === 'dark' ? 'Dark mode' : 'Light mode';
    }

    document.getElementById('btn-theme-toggle').onclick = () => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      setTheme(dark ? 'light' : 'dark');
    };
    setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
    if (window.lucide) lucide.createIcons();

    const form = document.getElementById('signup-form');
    const error = document.getElementById('error');
    const success = document.getElementById('success');
    const btn = document.getElementById('btn-signup');
    const btnText = btn.querySelector('.auth-submit-text');

    form.onsubmit = async (e) => {
      e.preventDefault();
      error.style.display = 'none';
      success.classList.add('hidden');
      btn.disabled = true;
      btnText.textContent = 'Memproses...';
      const fd = new FormData(form);
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: fd.get('username'),
            password: fd.get('password'),
            display_name: fd.get('display_name') || '',
            email: fd.get('email') || '',
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'Pendaftaran gagal');
        success.textContent = data.message || 'Pendaftaran berhasil. Tunggu persetujuan admin.';
        success.classList.remove('hidden');
        form.reset();
        btnText.textContent = 'Terdaftar ✓';
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'flex';
        btn.disabled = false;
        btnText.textContent = 'Daftar';
      }
    };
  </script>
</body>
</html>
